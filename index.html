<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dining Scene - Sunset Glass Sanctuary</title>
    <meta name="description" content="Aesthetic Sunset Sanctuary with Enhanced Entrance and Pathway">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #1a1a2e" shadow="type: pcfsoft" fog="type: exponential; color: #2C3E50; density: 0.012">
      
      <!-- Camera & Controls -->
      <a-entity id="rig" position="0 2.5 30">
        <a-camera look-controls wasd-controls></a-camera>
      </a-entity>

      <!-- ATMOSPHERE -->
      <a-sky material="shader: gradient; topColor: #0f2027; bottomColor: #f24e1e"></a-sky>
      
      <!-- The Sun -->
      <a-entity position="-60 15 -120">
        <a-sphere radius="12" color="#FF4500" material="emissive: #FF4500; emissiveIntensity: 3"></a-sphere>
        <a-light type="point" intensity="2" distance="300" color="#FF8C00"></a-light>
      </a-entity>

      <!-- GROUND (Outside) -->
      <a-plane id="sand" position="0 0 0" rotation="-90 0 0" width="1000" height="1000" color="#2c1e14" roughness="1" shadow="receive: true"></a-plane>
      
      <!-- Ocean -->
      <a-entity id="ocean-group" position="0 -0.5 -100">
        <a-plane rotation="-90 0 0" width="2000" height="600" color="#00050a" material="metalness: 0.9; roughness: 0.1"></a-plane>
      </a-entity>

      <!-- LIGHTING -->
      <a-light type="ambient" color="#555" intensity="0.5"></a-light>
      <a-light type="directional" color="#FFA500" intensity="1.5" position="30 50 30" castShadow="true"></a-light>

      <!-- DECORATIVE TREES & FOLIAGE -->
      <a-entity id="foliage">
        <a-entity position="-15 0 -10">
            <a-cylinder radius="0.3" height="9" color="#3d2b1f" roughness="1"></a-cylinder>
            <a-entity position="0 4.5 0">
                <a-cone radius-bottom="3.5" radius-top="0" height="4" color="#2d5a27" material="emissive: #1a3317; emissiveIntensity: 0.3"></a-cone>
            </a-entity>
        </a-entity>
        <a-entity position="18 0 -12">
            <a-cylinder radius="0.4" height="11" color="#3d2b1f" roughness="1"></a-cylinder>
            <a-entity position="0 5.5 0">
                <a-sphere radius="3" color="#1b4d3e" scale="1.5 0.8 1.5"></a-sphere>
            </a-entity>
        </a-entity>
      </a-entity>

      <!-- ENTRANCE & PATHWAY DECORATIONS -->
      <a-entity id="entrance-decorations">
        <!-- Luminous Glass Totems at Entrance -->
        <a-box position="-2.5 1 24" width="0.4" height="2" depth="0.4" color="#00E5FF" material="opacity: 0.6; transparent: true; emissive: #00E5FF; emissiveIntensity: 0.5"></a-box>
        <a-box position="2.5 1 24" width="0.4" height="2" depth="0.4" color="#0047AB" material="opacity: 0.6; transparent: true; emissive: #0047AB; emissiveIntensity: 0.5"></a-box>
        
        <!-- WELCOME SIGN BOARD (Right side of entrance) -->
        <a-entity id="welcome-sign" position="3.2 0 26" rotation="0 -15 0">
            <!-- Sign Posts -->
            <a-box position="-0.4 0.8 0" width="0.05" height="1.6" depth="0.05" color="#111"></a-box>
            <a-box position="0.4 0.8 0" width="0.05" height="1.6" depth="0.05" color="#111"></a-box>
            <!-- Sign Face -->
            <a-box position="0 1.2 0" width="1.2" height="0.6" depth="0.08" color="#222">
                <a-text value="WELCOME" align="center" position="0 0 0.05" color="#00E5FF" width="4" font="exo2bold"></a-text>
                <a-text value="TO THE SANCTUARY" align="center" position="0 -0.15 0.05" color="#FFF" width="2" font="exo2bold"></a-text>
            </a-box>
        </a-entity>

        <!-- Natural Rocks along Pathway -->
        <a-dodecahedron position="-2.5 0.2 18" radius="0.8" color="#444" scale="1 0.5 1.5"></a-dodecahedron>
        <a-dodecahedron position="2.8 0.3 14" radius="0.6" color="#555" scale="1.2 0.4 1"></a-dodecahedron>
        <a-dodecahedron position="-3.2 0.25 10" radius="1" color="#333" scale="0.8 0.5 1.2"></a-dodecahedron>
        
        <!-- Tall Reeds/Ornamental Grass -->
        <a-entity position="2.8 0 20">
            <a-cone radius-bottom="0.05" height="2.5" color="#2d5a27" rotation="5 0 0"></a-cone>
            <a-cone position="0.2 0 0.2" radius-bottom="0.04" height="2.2" color="#1b4d3e" rotation="-5 0 10"></a-cone>
            <a-cone position="-0.2 0 -0.1" radius-bottom="0.06" height="2.8" color="#3a7d32" rotation="0 0 -5"></a-cone>
        </a-entity>
        <a-entity position="-2.8 0 22">
            <a-cone radius-bottom="0.05" height="2.5" color="#2d5a27" rotation="-5 0 0"></a-cone>
            <a-cone position="-0.2 0 0.2" radius-bottom="0.04" height="2.2" color="#1b4d3e" rotation="5 0 -10"></a-cone>
        </a-entity>

        <!-- Pathway Lights (Recessed markers) -->
        <a-sphere position="-1.9 0.45 15" radius="0.1" color="#FFA500" material="emissive: #FFA500; emissiveIntensity: 2"></a-sphere>
        <a-sphere position="1.9 0.45 15" radius="0.1" color="#FFA500" material="emissive: #FFA500; emissiveIntensity: 2"></a-sphere>
        <a-sphere position="-1.9 0.45 10" radius="0.1" color="#FFA500" material="emissive: #FFA500; emissiveIntensity: 2"></a-sphere>
        <a-sphere position="1.9 0.45 10" radius="0.1" color="#FFA500" material="emissive: #FFA500; emissiveIntensity: 2"></a-sphere>
      </a-entity>

      <!-- ZEN PATHWAY LIGHTS (Scattered Jewels) -->
      <a-entity id="zen-stones">
        <a-sphere position="-4 0.1 15" radius="0.3" scale="1.5 0.5 1" color="#00E5FF" material="emissive: #00E5FF; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="4 0.1 12" radius="0.4" scale="1.2 0.4 1.2" color="#FF00FF" material="emissive: #FF00FF; emissiveIntensity: 1"></a-sphere>
      </a-entity>

      <!-- ENTRANCE -->
      <a-entity id="entrance" position="0 0 18">
        <a-box position="0 0.4 0" width="3.5" height="0.1" depth="12" color="#f5f5f5" shadow></a-box>
        <a-entity position="0 2.5 6">
            <a-box position="-1.8 -0.5 0" width="0.3" height="4" depth="0.3" color="#111"></a-box>
            <a-box position="1.8 -0.5 0" width="0.3" height="4" depth="0.3" color="#111"></a-box>
            <a-box position="0 1.5 0" width="3.9" height="0.2" depth="0.3" color="#111"></a-box>
            <a-light type="point" color="#00E5FF" intensity="1.2" position="0 1 0" distance="15"></a-light>
        </a-entity>
      </a-entity>

      <!-- THE FLOATING SANCTUARY -->
      <a-entity id="sanctuary" position="0 0 0">
        <!-- FLOOR: Polished Obsidian Grey -->
        <a-box position="0 0.5 0" width="14" height="0.4" depth="14" color="#333333" material="roughness: 0.4; metalness: 0.1" shadow></a-box>
        
        <!-- Area Rug Decoration -->
        <a-box position="0 0.51 0" width="8" height="0.05" depth="6" color="#222" material="roughness: 0.9"></a-box>

        <!-- Corner Decorations -->
        <a-entity id="corner-plants">
            <!-- Back Left Plant -->
            <a-entity position="-5.5 0.7 -5.5">
                <a-cylinder radius="0.4" height="0.8" color="#111"></a-cylinder>
                <a-sphere position="0 0.6 0" radius="0.5" color="#2d5a27" scale="1 1.5 1"></a-sphere>
            </a-entity>
            <!-- Back Right Plant -->
            <a-entity position="5.5 0.7 -5.5">
                <a-cylinder radius="0.4" height="0.8" color="#111"></a-cylinder>
                <a-sphere position="0 0.6 0" radius="0.5" color="#2d5a27" scale="1 1.5 1"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- Hanging Decor -->
        <a-entity id="hanging-lights" position="0 4.5 0">
            <a-entity position="-1 0 0">
                <a-cylinder radius="0.01" height="0.8" color="#555" position="0 0.4 0"></a-cylinder>
                <a-sphere radius="0.15" color="#FFA500" material="emissive: #FFA500; emissiveIntensity: 2"></a-sphere>
            </a-entity>
            <a-entity position="1 0 0">
                <a-cylinder radius="0.01" height="0.8" color="#555" position="0 0.4 0"></a-cylinder>
                <a-sphere radius="0.15" color="#FFA500" material="emissive: #FFA500; emissiveIntensity: 2"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- Glass Railings -->
        <a-box position="0 1.2 6.9" width="14" height="1" depth="0.1" material="opacity: 0.2; transparent: true; color: #AAF"></a-box>
        <a-box position="0 1.2 -6.9" width="14" height="1" depth="0.1" material="opacity: 0.2; transparent: true; color: #AAF"></a-box>

        <!-- Corner Supports -->
        <a-box position="-6.5 2.5 -6.5" width="1" height="4.2" depth="1" color="#00E5FF" material="opacity: 0.4; transparent: true; emissive: #00E5FF; emissiveIntensity: 0.5"></a-box>
        <a-box position="6.5 2.5 -6.5" width="1" height="4.2" depth="1" color="#00E5FF" material="opacity: 0.4; transparent: true; emissive: #00E5FF; emissiveIntensity: 0.5"></a-box>
        <a-box position="-6.5 2.5 6.5" width="1" height="4.2" depth="1" color="#00E5FF" material="opacity: 0.4; transparent: true; emissive: #00E5FF; emissiveIntensity: 0.5"></a-box>
        <a-box position="6.5 2.5 6.5" width="1" height="4.2" depth="1" color="#00E5FF" material="opacity: 0.4; transparent: true; emissive: #00E5FF; emissiveIntensity: 0.5"></a-box>

        <!-- Floating Roof -->
        <a-entity id="roof" position="0 4.7 0">
            <a-box width="16" height="0.15" depth="16" color="#FFFFFF" shadow></a-box>
            <a-box position="0 -0.1 0" width="14" height="0.1" depth="14" color="#111"></a-box>
        </a-entity>

        <!-- LUXURY DINING FEATURE -->
        <a-entity id="dining" position="0 1.2 0">
            <!-- TABLE -->
            <a-entity id="table">
                <a-box position="0 0.25 0" width="4.5" height="0.12" depth="2.5" color="#FFFFFF" material="roughness: 0.1; metalness: 0.2"></a-box>
                <a-cylinder position="0 -0.25 0" radius="0.15" height="1.1" color="#0047AB" material="metalness: 0.9; roughness: 0.1"></a-cylinder>
                <a-box position="0 -0.7 0" rotation="0 45 0" width="2.2" height="0.12" depth="0.2" color="#0047AB" material="metalness: 1; emissive: #001a3d; emissiveIntensity: 0.2"></a-box>
                <a-box position="0 -0.7 0" rotation="0 -45 0" width="2.2" height="0.12" depth="0.2" color="#0047AB" material="metalness: 1; emissive: #001a3d; emissiveIntensity: 0.2"></a-box>
                
                <!-- Centerpiece Decoration -->
                <a-cone position="0 0.4 0" radius-bottom="0.1" radius-top="0.05" height="0.2" color="#00E5FF" material="opacity: 0.8; transparent: true"></a-cone>
            </a-entity>
            
            <!-- CHAIRS -->
            <a-entity id="chairs">
                <!-- Left Side Chair -->
                <a-entity position="-2.8 0.1 0" rotation="0 90 0">
                    <a-box position="0 0.2 0" width="1" height="0.15" depth="1" color="#FFF"></a-box>
                    <a-box position="0 0.7 -0.45" width="1" height="1.1" depth="0.12" color="#1a1a1a"></a-box>
                    <a-cylinder position="0.4 -0.4 0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                    <a-cylinder position="-0.4 -0.4 0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                    <a-cylinder position="0.4 -0.4 -0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                    <a-cylinder position="-0.4 -0.4 -0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                </a-entity>
                <!-- Right Side Chair -->
                <a-entity position="2.8 0.1 0" rotation="0 -90 0">
                    <a-box position="0 0.2 0" width="1" height="0.15" depth="1" color="#FFF"></a-box>
                    <a-box position="0 0.7 -0.45" width="1" height="1.1" depth="0.12" color="#1a1a1a"></a-box>
                    <a-cylinder position="0.4 -0.4 0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                    <a-cylinder position="-0.4 -0.4 0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                    <a-cylinder position="0.4 -0.4 -0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                    <a-cylinder position="-0.4 -0.4 -0.4" radius="0.05" height="1.3" color="#0047AB" material="metalness: 0.8"></a-cylinder>
                </a-entity>
            </a-entity>

            <!-- BREAKFAST ITEMS -->
            <a-entity id="table-items" position="0 0.3 0">
                <a-entity position="-0.6 0.2 0">
                    <a-cylinder radius="0.22" height="0.55" color="#00693E"></a-cylinder> 
                    <a-text value="MILO" color="#00693E" align="center" position="0 0.05 0.23" width="2"></a-text>
                </a-entity>
                <a-entity position="0.6 0.25 0">
                    <a-box width="0.3" height="0.55" depth="0.3" color="#FFFFFF"></a-box>
                    <a-text value="MILK" color="#2196F3" align="center" position="0 0 0.16" width="2"></a-text>
                </a-entity>
                <!-- Large Plates -->
                <a-entity position="-1.5 0 0">
                    <a-cylinder radius="0.4" height="0.03" color="#F5F5F5"></a-cylinder> 
                    <a-entity position="0 0.1 0.4">
                        <a-cylinder radius="0.1" height="0.22" color="#FDFDFD"></a-cylinder>
                        <a-torus position="0.1 0 0" radius="0.06" radius-tubular="0.015" arc="180" rotation="0 0 -90" color="#FDFDFD"></a-torus>
                    </a-entity>
                </a-entity>
                <a-entity position="1.5 0 0">
                    <a-cylinder radius="0.4" height="0.03" color="#F5F5F5"></a-cylinder>
                    <a-entity position="0 0.1 0.4">
                        <a-cylinder radius="0.1" height="0.22" color="#FDFDFD"></a-cylinder>
                        <a-torus position="-0.1 0 0" radius="0.06" radius-tubular="0.015" arc="180" rotation="0 0 90" color="#FDFDFD"></a-torus>
                    </a-entity>
                </a-entity>
            </a-entity>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
