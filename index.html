<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Dining Scene - Interior House</title>
    <meta name="description" content="A-Frame Dining Room inside a house">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #111">
      
      <!-- Camera & Controls -->
      <a-entity position="0 1.6 4.5">
        <a-camera look-controls wasd-controls></a-camera>
      </a-entity>

      <!-- ROOM STRUCTURE -->
      <!-- Floor -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#5C4033" roughness="0.6"></a-plane>
      
      <!-- Ceiling -->
      <a-plane position="0 3.5 0" rotation="90 0 0" width="10" height="10" color="#F5F5F5"></a-plane>

      <!-- Back Wall -->
      <a-plane position="0 1.75 -3" width="10" height="3.5" color="#E3DAC9"></a-plane>
      
      <!-- Right Wall -->
      <a-plane position="5 1.75 0" rotation="0 -90 0" width="10" height="3.5" color="#E3DAC9"></a-plane>
      
      <!-- Left Wall with Window Opening (Cleanly Separated) -->
      <a-entity position="-5 1.75 0" rotation="0 90 0">
        <!-- Wall parts arranged with a slightly larger gap -->
        <a-plane position="0 1.45 0" width="10" height="0.6" color="#E3DAC9"></a-plane> <!-- Top -->
        <a-plane position="0 -1.25 0" width="10" height="1.0" color="#E3DAC9"></a-plane> <!-- Bottom -->
        <a-plane position="-3.3 0.1 0" width="3.4" height="2.1" color="#E3DAC9"></a-plane> <!-- Left -->
        <a-plane position="3.3 0.1 0" width="3.4" height="2.1" color="#E3DAC9"></a-plane> <!-- Right -->

        <!-- Window Group: Offset by 0.1 to prevent X-axis collision -->
        <a-entity position="0 0.1 -0.1">
           <!-- Window Frame -->
           <a-box position="0 0 0" width="2.4" height="2.0" depth="0.1" color="#3B1F15"></a-box>
           <!-- The View Outside (Glass) -->
           <a-plane position="0 0 -0.06" width="2.2" height="1.8" color="#87CEEB" material="shader: flat"></a-plane>
        </a-entity>
      </a-entity>

      <!-- Lighting -->
      <a-light type="ambient" color="#FFF" intensity="0.4"></a-light>
      <a-light type="point" color="#FFF" intensity="0.8" position="0 3 0" castShadow="true"></a-light>
      <a-light type="directional" color="#FFE" intensity="0.5" position="-4 2 0"></a-light>

      <!-- DINING TABLE GROUP -->
      <a-entity id="table" position="0 0 0">
        <a-box position="0 0.75 0" width="2.2" height="0.1" depth="1.4" color="#4B2C20" shadow></a-box>
        <a-box position="-1 0.375 -0.6" width="0.1" height="0.75" depth="0.1" color="#3B1F15"></a-box>
        <a-box position="1 0.375 -0.6" width="0.1" height="0.75" depth="0.1" color="#3B1F15"></a-box>
        <a-box position="-1 0.375 0.6" width="0.1" height="0.75" depth="0.1" color="#3B1F15"></a-box>
        <a-box position="1 0.375 0.6" width="0.1" height="0.75" depth="0.1" color="#3B1F15"></a-box>
      </a-entity>

      <!-- CHAIRS -->
      <a-entity id="chair1" position="-1.4 0 0" rotation="0 90 0">
        <a-box position="0 0.45 0" width="0.5" height="0.05" depth="0.5" color="#5D4037" shadow></a-box>
        <a-box position="0 0.85 -0.22" width="0.5" height="0.8" depth="0.05" color="#5D4037" shadow></a-box>
        <a-box position="-0.2 0.225 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
        <a-box position="0.2 0.225 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
        <a-box position="-0.2 0.225 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
        <a-box position="0.2 0.225 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
      </a-entity>

      <a-entity id="chair2" position="1.4 0 0" rotation="0 -90 0">
        <a-box position="0 0.45 0" width="0.5" height="0.05" depth="0.5" color="#5D4037" shadow></a-box>
        <a-box position="0 0.85 -0.22" width="0.5" height="0.8" depth="0.05" color="#5D4037" shadow></a-box>
        <a-box position="-0.2 0.225 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
        <a-box position="0.2 0.225 -0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
        <a-box position="-0.2 0.225 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
        <a-box position="0.2 0.225 0.2" width="0.05" height="0.45" depth="0.05" color="#3B1F15"></a-box>
      </a-entity>

      <!-- TABLE TOP ITEMS -->
      <!-- Cups -->
      <a-cylinder position="-0.5 0.88 0.1" radius="0.06" height="0.16" color="#FFFFFF"></a-cylinder>
      <a-cylinder position="0.5 0.88 -0.1" radius="0.06" height="0.16" color="#FFFFFF"></a-cylinder>

      <!-- Milo Tin -->
      <a-entity position="-0.15 0.8 0">
        <a-cylinder position="0 0.15 0" radius="0.12" height="0.3" color="#006a31" shadow></a-cylinder>
        <a-cylinder position="0 0.15 0" radius="0.122" height="0.08" color="#ffed00"></a-cylinder>
        <a-cylinder position="0 0.31 0" radius="0.12" height="0.02" color="#C0C0C0" material="metalness: 0.8; roughness: 0.2"></a-cylinder>
      </a-entity>

      <!-- Milk Tin (Condensed Milk style) -->
      <a-entity position="0.25 0.8 0.2">
        <!-- Main Tin Body -->
        <a-cylinder position="0 0.1 0" radius="0.1" height="0.2" color="#FFFFFF" shadow></a-cylinder>
        <!-- Blue Branding Label -->
        <a-cylinder position="0 0.1 0" radius="0.102" height="0.12" color="#0033A0"></a-cylinder>
        <!-- Tin Top Metal -->
        <a-cylinder position="0 0.21 0" radius="0.1" height="0.02" color="#C0C0C0" material="metalness: 0.7; roughness: 0.3"></a-cylinder>
      </a-entity>

    </a-scene>
  </body>
</html>
